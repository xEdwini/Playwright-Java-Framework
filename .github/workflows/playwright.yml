name: Java Playwright Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: mvn -B test-compile
      - run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"
      - run: mvn -B test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: java-playwright-artifacts
          path: |
            target/artifacts
            target/allure-results
            target/surefire-reports
